<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meeting Minutes</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
</head>
<body class="page-wrap">
  <header id="site-header">
    <div class="header-inner">
      <div class="site-title">🔥 Boisdale Station 34</div>
      <nav>
        <a href="../index.html">Home</a>
        <a href="notices.html">Notices</a>
        <a href="meetings.html">Fire Dept.</a>
        <a href="calendar.html">Calendar</a>
        <a href="projects.html">Projects</a>
        <a href="firedept.html" class="active">Minutes</a>
        <a href="community.html">Community</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <h1 class="page-title">Fire Department</h1>

      <div id="firedept-container" class="card-grid"></div>

      <br>

      <div class="section-panel">
        <h2>📄 Minutes Archive</h2>
        <div id="minutes-container"></div>
      </div>
    </div>
  </main>
  <footer id="site-footer">
    <div class="container">
      Boisdale Station 34 &nbsp;·&nbsp;
      3810 Grand Narrows Highway, Boisdale, Nova Scotia &nbsp;·&nbsp;
      <a href="tel:9025550100" id="footer-phone">(902) 555-0100</a> &nbsp;·&nbsp;
      <a href="mailto:boisdalevfd@gmail.com" id="footer-email">boisdalevfd@gmail.com</a>
    </div>
  </footer>
  <script src="../js/config.js"></script>
  <script src="../js/google-api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    document.title = "Fire Department — " + CONFIG.SITE.HALL_SHORT;

    UI.showLoading("firedept-container");
    GoogleAPI.fetchFiltered(CONFIG.SHEETS.MEETINGS)
      .then(rows => UI.renderCards("firedept-container", rows, { emptyMessage: "No fire department notices at this time." }))
      .catch(e  => UI.showError("firedept-container", e.message));

    UI.showLoading("minutes-container");
    GoogleAPI.listDriveFolder(CONFIG.DRIVE_FOLDERS.MINUTES)
      .then(files => UI.renderFileList("minutes-container", files))
      .catch(e    => UI.showError("minutes-container", e.message));
    GoogleAPI.fetchConfig().then(cfg => UI.applyConfig(cfg)).catch(() => {});
  </script>
</body>
</html>
