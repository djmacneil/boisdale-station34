<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fire Dept. Notices</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-wrap">
  <header id="site-header">
    <div class="header-inner">
      <div class="site-title">🔥 Boisdale Station 34</div>
      <nav>
        <a href="../index.html">Home</a>
        <a href="notices.html">Notices</a>
        <a href="meetings.html" class="active">Fire Dept.</a>
        <a href="calendar.html">Calendar</a>
        <a href="projects.html">Projects</a>
        <a href="minutes.html">Minutes</a>
        <a href="community.html">Community</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <h1 class="page-title">Fire Department Notices</h1>
      <p style="color:#666;margin-bottom:1.5rem;font-size:.95rem;">
        Upcoming and current fire department notices.
      </p>
      <div id="meetings-container" class="card-grid"></div>
    </div>
  </main>
  <footer id="site-footer">
    <div class="container">
      Boisdale Station 34 &nbsp;·&nbsp;
      3810 Grand Narrows Highway, Boisdale, Nova Scotia &nbsp;·&nbsp;
      <a href="tel:9025550100">(902) 555-0100</a> &nbsp;·&nbsp;
      <a href="mailto:boisdalevfd@gmail.com">boisdalevfd@gmail.com</a>
    </div>
  </footer>
  <script src="../js/config.js"></script>
  <script src="../js/google-api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    document.title = "Fire Dept. Notices — " + CONFIG.SITE.HALL_SHORT;
    UI.showLoading("meetings-container");
    GoogleAPI.fetchFiltered(CONFIG.SHEETS.MEETINGS)
      .then(rows => UI.renderCards("meetings-container", rows, { emptyMessage: "No meeting notices at this time." }))
      .catch(e   => UI.showError("meetings-container", e.message));
  </script>
</body>
</html>
