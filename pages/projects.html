<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-wrap">
  <header id="site-header">
    <div class="header-inner">
      <div class="site-title">🔥 Boisdale Station 34</div>
      <nav>
        <a href="../index.html">Home</a>
        <a href="notices.html">Notices</a>
        <a href="meetings.html">Meetings</a>
        <a href="calendar.html">Calendar</a>
        <a href="projects.html" class="active">Projects</a>
        <a href="minutes.html">Minutes</a>
        <a href="community.html">Community</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <h1 class="page-title">Project Updates</h1>

      <!-- Sheet-based project updates -->
      <div id="projects-container" class="card-grid"></div>

      <br>

      <!-- Drive folder: project documents -->
      <div class="section-panel">
        <h2>📁 Project Documents</h2>
        <div id="drive-container"></div>
      </div>
    </div>
  </main>
  <footer id="site-footer">
    <div class="container">
      Boisdale Station 34 &nbsp;·&nbsp;
      3810 Grand Narrows Highway, Boisdale, Nova Scotia &nbsp;·&nbsp;
      <a href="tel:9025550100">(902) 555-0100</a> &nbsp;·&nbsp;
      <a href="mailto:boisdalevfd@gmail.com">boisdalevfd@gmail.com</a>
    </div>
  </footer>
  <script src="../js/config.js"></script>
  <script src="../js/google-api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    document.title = "Projects — " + CONFIG.SITE.HALL_SHORT;

    UI.showLoading("projects-container");
    GoogleAPI.fetchUpcoming(CONFIG.SHEETS.PROJECTS)
      .then(rows => UI.renderCards("projects-container", rows, { emptyMessage: "No active project updates." }))
      .catch(e  => UI.showError("projects-container", e.message));

    UI.showLoading("drive-container");
    GoogleAPI.listDriveFolder(CONFIG.DRIVE_FOLDERS.PROJECTS)
      .then(files => UI.renderFileList("drive-container", files))
      .catch(e    => UI.showError("drive-container", e.message));
  </script>
</body>
</html>
