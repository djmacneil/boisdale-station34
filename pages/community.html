<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Community Information</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
</head>
<body class="page-wrap">
  <header id="site-header">
    <div class="header-inner">
      <div class="site-title">🔥 Boisdale Fire Station 34</div>
      <nav>
        <a href="../index.html">Home</a>
        <a href="notices.html">Notices</a>
        <a href="meetings.html">Fire Dept.</a>
        <a href="calendar.html">Calendar</a>
        <a href="projects.html">Projects</a>
        <a href="firedept.html">Minutes</a>
        <a href="community.html" class="active">Community</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <h1 class="page-title">Community Information</h1>

      <div id="community-container" class="card-grid"></div>

      <br>

      <div class="section-panel">
        <h2>📁 Community Documents</h2>
        <div id="drive-container"></div>
      </div>
    </div>
  </main>
  <footer id="site-footer">
    <div class="container">
      Boisdale Fire Station 34 &nbsp;·&nbsp;
      3810 Grand Narrows Highway, Boisdale, Nova Scotia &nbsp;·&nbsp;
      <a href="tel:9025550100" id="footer-phone">(902) 555-0100</a> &nbsp;·&nbsp;
      <a href="mailto:boisdalevfd@gmail.com" id="footer-email">boisdalevfd@gmail.com</a>
    </div>
  </footer>
  <script src="../js/config.js"></script>
  <script src="../js/google-api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    document.title = "Community — " + CONFIG.SITE.HALL_SHORT;

    UI.showLoading("community-container");
    Promise.all([
      GoogleAPI.fetchFiltered(CONFIG.SHEETS.COMMUNITY),
      GoogleAPI.fetchPostsByCategory('Community')
    ]).then(([legacyRows, postRows]) => {
      const legacyHtml = legacyRows.length
        ? legacyRows.map(row => `
          <article class="card">
            ${row.category ? `<span class="badge">${row.category}</span>` : ""}
            <h3 class="card-title">${UI.escHtml(row.title || "Untitled")}</h3>
            ${row.body ? `<div class="card-body">${UI.escHtml(row.body).replace(/\n/g,'<br>')}</div>` : ""}
          </article>`).join('')
        : '';
      const postHtml = postRows.map(row => UI.buildPostCard(row)).join('');
      const combined = legacyHtml + postHtml;
      const el = document.getElementById('community-container');
      el.innerHTML = combined || '<p class="empty-msg">No community information posted.</p>';
    }).catch(e => UI.showError("community-container", e.message));

    UI.showLoading("drive-container");
    GoogleAPI.listDriveFolder(CONFIG.DRIVE_FOLDERS.GENERAL)
      .then(files => UI.renderFileList("drive-container", files))
      .catch(e    => UI.showError("drive-container", e.message));
    GoogleAPI.fetchConfig().then(cfg => UI.applyConfig(cfg)).catch(() => {});
  </script>
</body>
</html>
